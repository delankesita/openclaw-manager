<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <rect width="600" height="400" fill="#1e1e1e"/>
  
  <!-- Header -->
  <rect width="600" height="40" fill="#252526"/>
  <text x="20" y="27" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold">📡 Channel Configuration</text>
  
  <!-- Channel Type: Feishu -->
  <rect x="15" y="55" width="570" height="100" rx="6" fill="#2d2d2d" stroke="#3c3c3c"/>
  <rect x="15" y="55" width="570" height="35" rx="6" fill="#3c3c3c"/>
  <rect x="15" y="82" width="570" height="8" rx="0" fill="#2d2d2d"/>
  <text x="35" y="80" fill="#ffffff" font-family="Arial" font-size="14">📱 Feishu</text>
  <rect x="520" y="62" width="55" height="20" rx="10" fill="#28a745"/>
  <text x="530" y="76" fill="#ffffff" font-family="Arial" font-size="10">Enabled</text>
  
  <text x="30" y="115" fill="#808080" font-family="Arial" font-size="11">Connection Mode:</text>
  <rect x="130" y="100" width="100" height="22" rx="3" fill="#3c3c3c"/>
  <text x="140" y="115" fill="#ffffff" font-family="Arial" font-size="10">WEBSOCKET ▾</text>
  
  <text x="260" y="115" fill="#808080" font-family="Arial" font-size="11">App ID:</text>
  <rect x="310" y="100" width="120" height="22" rx="3" fill="#3c3c3c"/>
  <text x="318" y="115" fill="#569cd6" font-family="Arial" font-size="10">cli_xxxxxxxxxxxx</text>
  
  <text x="30" y="145" fill="#808080" font-family="Arial" font-size="11">App Secret:</text>
  <rect x="100" y="130" width="150" height="22" rx="3" fill="#3c3c3c"/>
  <text x="108" y="145" fill="#569cd6" font-family="Arial" font-size="10">••••••••••••••</text>
  
  <rect x="270" y="130" width="90" height="22" rx="3" fill="#0e639c"/>
  <text x="283" y="145" fill="#ffffff" font-family="Arial" font-size="10">Test Connection</text>
  <text x="380" y="145" fill="#28a745" font-family="Arial" font-size="10">✓ Connected</text>
  
  <!-- Channel Type: DingTalk -->
  <rect x="15" y="165" width="570" height="80" rx="6" fill="#2d2d2d" stroke="#3c3c3c"/>
  <rect x="15" y="165" width="570" height="35" rx="6" fill="#3c3c3c"/>
  <rect x="15" y="192" width="570" height="8" fill="#2d2d2d"/>
  <text x="35" y="190" fill="#ffffff" font-family="Arial" font-size="14">🔔 DingTalk</text>
  <rect x="520" y="172" width="55" height="20" rx="10" fill="#28a745"/>
  <text x="530" y="186" fill="#ffffff" font-family="Arial" font-size="10">Enabled</text>
  
  <text x="30" y="225" fill="#808080" font-family="Arial" font-size="11">Mode:</text>
  <rect x="70" y="210" width="80" height="22" rx="3" fill="#3c3c3c"/>
  <text x="80" y="225" fill="#ffffff" font-family="Arial" font-size="10">STREAM ▾</text>
  
  <text x="170" y="225" fill="#808080" font-family="Arial" font-size="11">Client ID:</text>
  <rect x="230" y="210" width="120" height="22" rx="3" fill="#3c3c3c"/>
  <text x="238" y="225" fill="#569cd6" font-family="Arial" font-size="10">dingxxxxxxxxxxxx</text>
  
  <!-- Channel Type: WeCom (collapsed) -->
  <rect x="15" y="255" width="570" height="35" rx="6" fill="#2d2d2d" stroke="#3c3c3c"/>
  <text x="35" y="278" fill="#ffffff" font-family="Arial" font-size="14">💬 WeCom</text>
  <text x="120" y="278" fill="#808080" font-family="Arial" font-size="11">Enterprise WeChat bot integration</text>
  <rect x="520" y="262" width="55" height="20" rx="10" fill="#3c3c3c"/>
  <text x="530" y="276" fill="#808080" font-family="Arial" font-size="10">Disabled</text>
  
  <!-- Channel Type: Discord (collapsed) -->
  <rect x="15" y="300" width="570" height="35" rx="6" fill="#2d2d2d" stroke="#3c3c3c"/>
  <text x="35" y="323" fill="#ffffff" font-family="Arial" font-size="14">🎮 Discord</text>
  <text x="110" y="323" fill="#808080" font-family="Arial" font-size="11">Discord bot integration</text>
  <rect x="520" y="307" width="55" height="20" rx="10" fill="#3c3c3c"/>
  <text x="530" y="321" fill="#808080" font-family="Arial" font-size="10">Disabled</text>
  
  <!-- Footer buttons -->
  <rect x="380" y="360" width="90" height="28" rx="4" fill="#3c3c3c"/>
  <text x="405" y="378" fill="#ffffff" font-family="Arial" font-size="11">Cancel</text>
  <rect x="480" y="360" width="90" height="28" rx="4" fill="#0e639c"/>
  <text x="505" y="378" fill="#ffffff" font-family="Arial" font-size="11">Save</text>
</svg>
